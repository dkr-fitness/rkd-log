<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Donovan · 8-Week Block + RKD</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0E1526; --surface:#16203A; --card:#1B2A4A; --line:#2A3A5E;
  --amber:#F5A623; --green:#34C77B; --blue:#5CA8FF; --red:#E05B5B;
  --text:#E9EDF5; --muted:#8A93A6;
  --z1:#6B7A94; --z2:#22D3EE; --z3:#5B7CFA; --z4:#D946EF; --z5:#FF6A00;
  --gold:#F5C242; --silver:#C0C9D6; --bronze:#C98A5A;
  --disp:'Barlow Condensed', system-ui, sans-serif;
  --body:system-ui, -apple-system, 'Segoe UI', sans-serif;
  --mono:ui-monospace, 'SF Mono', Menlo, monospace;
}
*{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent}
body{background:var(--bg); color:var(--text); font-family:var(--body); font-size:15px; padding-bottom:130px}
.topbar{position:sticky; top:0; z-index:20; background:var(--card); border-bottom:2px solid var(--amber); padding:10px 14px; display:flex; align-items:center; justify-content:space-between; gap:8px}
.topbar h1{font-family:var(--disp); font-weight:700; font-size:19px; letter-spacing:.04em; text-transform:uppercase}
.clock{font-family:var(--disp); font-weight:700; font-size:26px; color:var(--amber); min-width:74px; text-align:right; font-variant-numeric:tabular-nums}
.clock.paused{color:var(--muted)}

/* ===== HR / RKD band ===== */
#hrband{position:sticky; top:52px; z-index:19; padding:8px 14px 7px; background:var(--surface); border-bottom:1px solid var(--line); transition:background-color .6s ease}
#hrband.z1{background:linear-gradient(160deg,#2A3550,#1B2338)}
#hrband.z2{background:linear-gradient(160deg,#0A6B80,#083D4A)}
#hrband.z3{background:linear-gradient(160deg,#2B3FB0,#1B2870)}
#hrband.z4{background:linear-gradient(160deg,#8E22A8,#5A1270)}
#hrband.z5{background:linear-gradient(160deg,#C24E00,#8F3400)}
.hb-row{display:flex; align-items:center; gap:12px}
.hb-stat{text-align:center}
.hb-stat .v{font-family:var(--disp); font-weight:700; font-size:24px; line-height:1; font-variant-numeric:tabular-nums}
.hb-stat .l{font-size:9px; text-transform:uppercase; letter-spacing:.12em; color:rgba(255,255,255,.6)}
.hb-zone{flex:1; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:rgba(255,255,255,.85)}
#btnConnect{background:var(--blue); color:#fff; border:none; border-radius:999px; padding:7px 14px; font-weight:700; font-size:12px}
#btnConnect.linked{background:rgba(255,255,255,.14); font-size:11px}
#zoneTicks{display:flex; gap:3px; margin-top:6px; height:4px}
#zoneTicks span{flex:1; background:rgba(255,255,255,.14); border-radius:2px}
#zoneTicks span.on{background:rgba(255,255,255,.9)}

.selects{display:flex; gap:8px; padding:10px 14px; background:var(--surface)}
select{flex:1; background:var(--card); color:var(--text); border:1px solid var(--line); border-radius:8px; padding:9px 10px; font-size:15px}
.tabs{display:flex; gap:6px; padding:0 14px 10px; background:var(--surface); border-bottom:1px solid var(--line)}
.tab{flex:1; padding:8px; text-align:center; border-radius:8px; border:1px solid var(--line); background:transparent; color:var(--muted); font-size:14px; font-weight:600}
.tab.active{background:var(--amber); color:#0E1526; border-color:var(--amber)}
main{padding:12px 14px}
.meta{background:var(--surface); border:1px solid var(--line); border-left:3px solid var(--green); border-radius:8px; padding:10px 12px; font-size:13px; color:var(--muted); margin-bottom:8px}
.meta b{color:var(--green); font-weight:600}
.meta.eq{border-left-color:var(--blue)} .meta.eq b{color:var(--blue)}
.meta.px{border-left-color:var(--z4)} .meta.px b{color:var(--z4)}
.meta.warn{border-left-color:var(--amber)} .meta.warn b{color:var(--amber)}
.block{background:var(--card); border:1px solid var(--line); border-radius:12px; margin-bottom:14px; overflow:hidden; transition:border-color .3s}
.block.live{border-color:var(--amber); box-shadow:0 0 0 1px var(--amber)}
.block.finished{border-color:var(--green)}
.block-h{display:flex; justify-content:space-between; align-items:center; padding:10px 12px; background:linear-gradient(90deg,#1B2A4A,#22345C); gap:8px}
.block-h .t{font-family:var(--disp); font-weight:700; font-size:17px; letter-spacing:.05em; text-transform:uppercase; flex:1}
.bells{font-family:var(--disp); font-weight:700; font-size:14px; color:var(--muted); white-space:nowrap}
.playb{width:52px; height:40px; border-radius:9px; border:none; background:var(--amber); color:#0E1526; font-size:18px; font-weight:800}
.playb.live{background:var(--red); color:#fff}
.playb.done{background:var(--green)}
.ex{padding:10px 12px; border-top:1px solid var(--line)}
.ex-name{font-weight:700; font-size:15px}
.ex-rx{color:var(--muted); font-size:13px; margin:2px 0 8px}
.sets{display:flex; flex-direction:column; gap:6px}
.set{display:flex; align-items:center; gap:8px}
.set .n{font-family:var(--disp); font-weight:700; color:var(--muted); width:20px; font-size:15px}
.set.now .n{color:var(--amber)}
.set input{width:80px; background:var(--surface); border:1px solid var(--line); border-radius:7px; color:var(--text); font-family:var(--mono); font-size:15px; padding:8px; text-align:center}
.set input:focus{outline:none; border-color:var(--amber)}
.set .x{color:var(--muted)}
.notecard{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:12px; margin-bottom:14px}
.notecard label{font-size:13px; color:var(--muted); display:block; margin-bottom:6px}
.notecard textarea{width:100%; background:var(--surface); border:1px solid var(--line); border-radius:8px; color:var(--text); padding:9px; font-size:15px; font-family:var(--body)}
.notecard input[type=number]{background:var(--surface); border:1px solid var(--line); border-radius:8px; color:var(--text); padding:9px; font-size:15px; width:90px; text-align:center; font-family:var(--mono)}
.notecard select{padding:9px 10px}
.rpe-row{display:flex; gap:6px; margin-top:6px}
.rpe{flex:1; padding:9px 0; border-radius:8px; border:1px solid var(--line); background:var(--surface); color:var(--muted); font-weight:700}
.rpe.on{background:var(--amber); color:#0E1526; border-color:var(--amber)}
.savebtn{width:100%; padding:14px; border-radius:10px; border:none; background:var(--green); color:#0E1526; font-size:17px; font-weight:800; font-family:var(--disp); letter-spacing:.06em; text-transform:uppercase}
.restbtn{width:100%; padding:12px; margin-top:8px; border-radius:10px; border:1px solid var(--line); background:var(--card); color:var(--muted); font-size:15px; font-weight:700; font-family:var(--disp); letter-spacing:.06em; text-transform:uppercase}
.btn2{padding:10px 14px; border-radius:8px; border:1px solid var(--line); background:var(--card); color:var(--text); font-weight:600; font-size:14px}
.btn2.acc{background:var(--blue); border-color:var(--blue); color:#fff}
.dock{position:fixed; bottom:0; left:0; right:0; z-index:30; background:#101A31; border-top:2px solid var(--line); padding:10px 14px 16px}
.dock-idle{color:var(--muted); font-size:13px; text-align:center; padding:8px 0}
.dock-run{display:flex; align-items:center; gap:14px}
.d-block{font-family:var(--disp); font-weight:700; font-size:30px; color:var(--amber); background:rgba(245,166,35,.12); border:1px solid rgba(245,166,35,.4); border-radius:10px; padding:4px 14px}
.d-mid{flex:1}
.d-set{font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.1em}
.d-time{font-family:var(--disp); font-weight:700; font-size:52px; line-height:1; font-variant-numeric:tabular-nums; color:var(--text)}
.d-time.warn{color:var(--amber)}
.d-stop{width:52px; height:52px; border-radius:10px; border:1px solid var(--red); background:transparent; color:var(--red); font-size:20px; font-weight:800}
.hist-card{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:12px; margin-bottom:10px}
.hist-card .h{display:flex; justify-content:space-between; align-items:center; font-weight:700; margin-bottom:4px; gap:8px}
.hist-card .sub{color:var(--muted); font-size:13px}
.pxi-pill{font-family:var(--disp); font-weight:700; font-size:15px; color:var(--z4); white-space:nowrap}
.medal-pill{display:inline-block; padding:2px 8px; border-radius:999px; font-size:10px; font-weight:800; letter-spacing:.08em; background:var(--surface); border:1px solid var(--line)}
.note-ic{color:var(--muted); vertical-align:middle; flex-shrink:0}
.note-full{background:var(--surface); border:1px solid var(--line); border-radius:8px; padding:8px 10px; margin-top:8px; font-size:13px; white-space:pre-wrap}
.pr-grid{display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:14px}
.pr{background:var(--card); border:1px solid var(--line); border-radius:10px; padding:10px}
.pr .l{font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.06em}
.pr .v{font-family:var(--disp); font-weight:700; font-size:26px; color:var(--amber)}
.row2{display:flex; gap:8px; margin-top:6px}
.row2 button{flex:1; padding:10px; border-radius:8px; border:1px solid var(--line); background:var(--card); color:var(--text); font-weight:600}
.toast{position:fixed; top:64px; left:50%; transform:translateX(-50%); background:var(--green); color:#0E1526; font-weight:700; padding:10px 18px; border-radius:20px; z-index:50; opacity:0; transition:opacity .25s; pointer-events:none}
.toast.show{opacity:1}
.warnbar{background:rgba(224,91,91,.12); border:1px solid var(--red); color:#F0B3B3; border-radius:8px; padding:8px 12px; font-size:13px; margin-bottom:10px}
.howto{background:var(--surface); border:1px dashed var(--line); border-radius:8px; padding:10px 12px; font-size:13px; color:var(--muted); margin-bottom:10px}
.howto b{color:var(--amber)}
.bigscore{text-align:center; padding:14px 0 6px}
.bigscore .v{font-family:var(--disp); font-weight:700; font-size:64px; line-height:1; color:var(--z4)}
.bigscore .sub{color:var(--muted); font-size:13px; margin-top:4px}
.bigscore .medal{font-family:var(--disp); font-weight:700; font-size:16px; letter-spacing:.12em; text-transform:uppercase; margin-top:6px}
.zGrid{display:grid; grid-template-columns:repeat(5,1fr); gap:8px; margin:10px 0}
.zGrid label{display:flex; flex-direction:column; gap:5px; font-size:10px; text-transform:uppercase; letter-spacing:.06em; text-align:center; color:var(--muted)}
.zGrid input{width:100%; background:var(--surface); border:1px solid var(--line); border-radius:7px; color:var(--text); font-family:var(--mono); font-size:15px; padding:8px; text-align:center}
.zDot{width:100%; height:5px; border-radius:3px}
.fieldrow{display:flex; align-items:center; justify-content:space-between; gap:10px; padding:7px 0}
.fieldrow span{font-size:14px}
/* zone compliance rows (Tue/Thu Z2 + Sat class) */
.zc-row{display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--line)}
.zc-row:last-child{border-bottom:none}
.zc-row .zl{width:74px; font-family:var(--disp); font-weight:700; font-size:14px}
.zc-row .zr{flex:1; color:var(--muted); font-size:12px}
.zc-row .zv{font-family:var(--disp); font-weight:700; font-size:20px; font-variant-numeric:tabular-nums; min-width:64px; text-align:right}
.zc-row.ok .zv{color:var(--green)} .zc-row.warn .zv{color:var(--amber)} .zc-row.bad .zv{color:var(--red)}
@media(min-width:700px){ main{max-width:640px; margin:0 auto} .dock{max-width:640px; margin:0 auto; left:50%; transform:translateX(-50%); border-radius:14px 14px 0 0} }
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="topbar">
  <h1 id="title">8-Week Block</h1>
  <div class="clock paused" id="clock">0:00</div>
</div>

<div id="hrband">
  <div class="hb-row">
    <div class="hb-stat"><div class="v" id="bpmV">--</div><div class="l">BPM</div></div>
    <div class="hb-stat"><div class="v" id="pctV">--</div><div class="l">%Max</div></div>
    <div class="hb-stat"><div class="v" id="pxiV" style="color:var(--z4)">0</div><div class="l">RKD</div></div>
    <div class="hb-zone" id="zoneName">HR not connected</div>
    <button id="btnConnect" onclick="connectWhoop()">Link WHOOP</button>
  </div>
  <div id="zoneTicks"><span></span><span></span><span></span><span></span><span></span></div>
</div>

<div class="selects">
  <select id="weekSel" onchange="stopBlock();render()"></select>
  <select id="daySel" onchange="stopBlock();render()">
    <option value="upper">Mon · Upper</option>
    <option value="tue">Tue · Zone 2 / Rest</option>
    <option value="lower">Wed · Lower</option>
    <option value="thu">Thu · Zone 2 / Rest</option>
    <option value="mixed">Fri · Mixed</option>
    <option value="sat">Sat · BFT/Equinox Class</option>
    <option value="sun">Sun · CS4 Recovery</option>
  </select>
</div>
<div class="tabs">
  <button class="tab active" id="tabS" onclick="setView('session')">Session</button>
  <button class="tab" id="tabP" onclick="setView('pxi')">RKD</button>
  <button class="tab" id="tabH" onclick="setView('history')">History</button>
</div>
<main id="main"></main>
<div class="dock" id="dock"><div class="dock-idle">Reach your equipment → press ▶ on that block. Bell = start your set. Rest until the next bell.</div></div>
<div class="toast" id="toast"></div>

<script>
/* ================= PROGRAM DATA ================= */
const BENCH=[[3,10,"120 lb",12],[4,8,"130 lb",13],[4,8,"135 lb",13],[4,6,"145 lb",13],[5,5,"150 lb",14],[4,3,"160 lb",15],[5,2,"170 lb",17],["Ramp","1","185–195 test",16]];
const PULL=[[4,6,"BW"],[4,6,"BW +2s lower"],[4,5,"+10 lb"],[4,5,"+15 lb"],[4,4,"+20 lb"],[4,3,"+25 lb"],[4,3,"+30 lb"],["Ramp","1–3","+35–45 test"]];
const DL=[[3,8,"220 lb",13],[3,8,"235 lb",13],[4,6,"250 lb",14],[4,5,"260 lb",14],[5,4,"270 lb",15],[4,3,"285 lb",15],[3,2,"305 lb",16],["Ramp","1","335–350 test",16]];
const SQ=[[3,8,"185 lb",10],[3,8,"195 lb",10],[4,6,"205 lb",10],[4,6,"215 lb",10],[4,5,"225 lb",10],[3,4,"235 lb",9],[3,3,"245 lb",9],[2,3,"205 deload",6]];
const OHP=w=>w<=2?[3,10,"75 lb"]:w<=5?[4,8,"85 lb"]:w<=7?[4,5,"100 lb"]:[2,5,"85 lb"];
const ROW=w=>w<=2?[3,10,"115 lb"]:w<=5?[4,8,"125 lb"]:w<=7?[4,6,"135 lb"]:[2,6,"115 lb"];
const FIN=[
 {n:"Erg medley: 3 rds — 250m row / 200m ski / 10 cal runner",rounds:3,mins:12},
 {n:"Carry complex: 4 rds — 40yd farmer / 20yd suitcase ea side / 10 KB swings",rounds:4,mins:12},
 {n:"Bike sprints: 6 × 20s hard / 100s easy",rounds:6,mins:12}];
const EQ={
 upper:"Bench + barbell + plates · pull-up bar + dip belt · DBs · adjustable bench · cable or band (face pulls)",
 lower:"Barbell + plates · squat rack · DBs (BSS + SL-RDL) · bench · farmer handles/heavy DBs · cable or band (Pallof)",
 mixed:"Barbell (OHP + row) · landmine · trap bar or box · DBs (step-ups) · finisher gear"};
function hrText(day,w){
  if(day==="mixed"&&w===8) return "Taper: Z1–Z2 only. Save everything for Monday/Wednesday test days.";
  return {
   upper:"Strength curve — stay Z0–Z2, brief Z3 fine. Target RKD ≈ 105 (Gold 100–110). Sustained Z4 = the bells are being ignored.",
   lower:"Strength curve — Z1–Z2 base, DL spikes to Z3 OK. Target RKD ≈ 105. HR won't drop before the bell = note it, don't rush.",
   mixed:"Hybrid — strength curve applies through Block B. Finisher may touch Z3–low Z4 for ≤4 min total. Seasoning, not a HIIT class."}[day];
}
const nSets=s=>typeof s==="number"?s:4;
const q15=s=>Math.max(60,Math.round(s/15)*15);

function getSession(w,day){
  if(day==="upper"){const b=BENCH[w-1],p=PULL[w-1];return {name:"UPPER — Bench + Pull-Up", type:"lift", blocks:[
    {letter:"W",t:"Warm-up",mins:7,bells:1,ex:[{n:"Row/bike 5 min → pull-aparts ×20 → scap pull-ups ×8 → push-ups ×10 → bar bench ×10 + ramp sets",rx:"one 7:00 countdown",sets:0}]},
    {letter:"A",t:"Bench Press",mins:b[3],bells:nSets(b[0]),ex:[{n:"Bench Press",rx:b[0]+" × "+b[1]+" @ "+b[2],sets:nSets(b[0]),key:"Bench Press"}]},
    {letter:"B",t:"Weighted Pull-Up",mins:9,bells:nSets(p[0]),ex:[{n:"Weighted Pull-Up",rx:p[0]+" × "+p[1]+" @ "+p[2],sets:nSets(p[0]),key:"Weighted Pull-Up"}]},
    {letter:"C",t:"Superset",mins:9,bells:3,ex:[{n:"Single-Arm DB Row",rx:"3 × 10/side",sets:3,key:"SA DB Row"},{n:"Incline DB Press",rx:"3 × 10 — straight into it after the row",sets:3,key:"Incline DB Press"}]},
    {letter:"D",t:"Superset",mins:5,bells:2,ex:[{n:"Face Pull",rx:"2 × 15 light",sets:2,key:"Face Pull"},{n:"Dead Hang",rx:"2 × max — log seconds as weight",sets:2,key:"Dead Hang"}]}]};}
  if(day==="lower"){const d0=DL[w-1],s0=SQ[w-1];return {name:"LOWER — Deadlift + Squat", type:"lift", blocks:[
    {letter:"W",t:"Warm-up",mins:7,bells:1,ex:[{n:"Bike 5 min → hip rolls ×10 → leg overs ×10 → BW squat ×15 → SL-RDL reach ×8/side + ramp sets",rx:"one 7:00 countdown",sets:0}]},
    {letter:"A",t:"Deadlift",mins:d0[3],bells:nSets(d0[0]),ex:[{n:"Conventional Deadlift — reset every rep",rx:d0[0]+" × "+d0[1]+" @ "+d0[2],sets:nSets(d0[0]),key:"Deadlift"}]},
    {letter:"B",t:"Back Squat",mins:s0[3],bells:s0[0],ex:[{n:"Back Squat",rx:s0[0]+" × "+s0[1]+" @ "+s0[2],sets:s0[0],key:"Back Squat"}]},
    {letter:"C",t:"Superset",mins:10,bells:3,ex:[{n:"Bulgarian Split Squat",rx:"3 × 8/side",sets:3,key:"Bulgarian SS"},{n:"Single-Leg RDL (DB)",rx:"3 × 8/side — straight after BSS",sets:3,key:"SL RDL"}]},
    {letter:"D",t:"Superset",mins:5,bells:2,ex:[{n:"Farmer Carry",rx:"2 × 40 yd heavy — log load",sets:2,key:"Farmer Carry"},{n:"Pallof / Hanging Knee Raise",rx:"2 × 10–12",sets:2,key:"Pallof"}]}]};}
  if(day==="mixed"){
    const o=OHP(w),r=ROW(w),f=FIN[(w-1)%3];
    const blocks=[
      {letter:"W",t:"Warm-up",mins:6,bells:1,ex:[{n:"Ski/runner easy 4 min → hand walk-outs ×6 → side lunge ×8/side → A-skips",rx:"one 6:00 countdown",sets:0}]},
      {letter:"A",t:"Superset",mins:12,bells:o[0],ex:[{n:"Overhead Press",rx:o[0]+" × "+o[1]+" @ "+o[2],sets:o[0],key:"OHP"},{n:"Barbell Bent-Over Row",rx:r[0]+" × "+r[1]+" @ "+r[2]+" — straight after OHP",sets:r[0],key:"BB Row"}]},
      {letter:"B",t:"Power / Unilateral",mins:12,bells:3,ex:[{n:"Trap Bar Jump or Box Jump",rx:"3 × 5 explosive",sets:3,key:"Jump"},{n:"DB Step-Up",rx:"3 × 8/side",sets:3,key:"Step-Up"},{n:"Landmine Rotation",rx:"3 × 8/side",sets:3,key:"Landmine Rot"}]}];
    if(w<8) blocks.push({letter:"C",t:"Finisher · RPE cap 8",mins:f.mins,bells:f.rounds,ex:[{n:f.n,rx:"bell = start next round",sets:0}]});
    else blocks.push({letter:"C",t:"No finisher — taper",mins:0,bells:0,ex:[{n:"Leave the gym feeling fresh.",rx:"",sets:0}]});
    return {name:"MIXED — Hybrid Supersets", type:"lift", blocks};
  }
  if(day==="tue"||day==="thu"){
    return {name:"ZONE 2 — Optional", type:"zone2", blocks:[
      {letter:"Z",t:"Zone 2 · straight",mins:30,bells:1,ex:[{n:"Peloton class, jog, ski, row, or assault runner — conversational pace",rx:"one 30:00 countdown · stop anywhere in the 25–35 min window",sets:0}]}]};
  }
  if(day==="sat"){
    return {name:"BFT / EQUINOX CLASS", type:"class", blocks:[]};
  }
  return {name:"CS4 — Active Recovery", type:"recovery", blocks:[]};
}
const interval=b=>b.bells>0?q15(b.mins*60/b.bells):0;

/* ================= RKD ENGINE ================= */
/* Strength curve per program sheet: Z0≈1 · Z1≈2 · Z2≈4 (peak) · Z3≈3 · Z4≈1.5 · Z5≈0.8 pts/min */
const PTS={ cardio:[0,1,2,3,4,5], strength:[1,2,4,3,1.5,0.8], summit:[0,1,2,3,4.35,5] };
const MODEL_DESC={
  cardio:"Straight ramp: 1–5 pts/min from Z1 to Z5.",
  strength:"Inverted-U per your sheet: Z0 1 · Z1 2 · Z2 4 (peak) · Z3 3 · Z4 1.5 · Z5 0.8 pts/min. Score by lifting, not redlining.",
  summit:"Cardio family with a Z4 boost (~4.35 pts/min at 80–89%)."};
const ZONE_NAMES=["Below zones","Zone 1 · 50–59%","Zone 2 · 60–69%","Zone 3 · 70–79%","Zone 4 · 80–89%","Zone 5 · 90%+"];
function zoneOf(pct){ if(pct>=90)return 5; if(pct>=80)return 4; if(pct>=70)return 3; if(pct>=60)return 2; if(pct>=50)return 1; return 0; }
function scoreZones(mins,model){ const p=PTS[model]||PTS.cardio; return mins.reduce((s,m,i)=>s+m*p[i],0); }
function medalFor(pxi,target){
  if(!target) return null;
  const dev=Math.abs(pxi-target)/target*100;
  if(dev<=5) return {t:"GOLD",c:"var(--gold)"};
  if(dev<=10) return {t:"SILVER",c:"var(--silver)"};
  if(dev<=15) return {t:"BRONZE",c:"var(--bronze)"};
  return {t:"OFF TARGET",c:"var(--muted)"};
}
/* Tue/Thu compliance medal tiers — independent of the lifting-day target/curve system */
function zone2MedalFor(m2,m3,m45){
  if(m2>=25&&m2<=35&&m3<=3&&m45===0) return {t:"GOLD",c:"var(--gold)"};
  if(m2>=20&&m2<=40&&m3<=8&&m45<=2) return {t:"SILVER",c:"var(--silver)"};
  if(m2>=15&&m2<=45&&m3<=10&&m45<=4) return {t:"BRONZE",c:"var(--bronze)"};
  return null;
}
const LIFT_DAYS=["upper","lower","mixed"];
function curDay(){ return document.getElementById("daySel").value; }
function curModel(){
  if(pxiSet.model!=="auto") return pxiSet.model;
  /* sheet: strength curve on all lifting days (mixed through Block B); class day = cardio ramp informationally */
  return curDay()==="sat"?"cardio":"strength";
}

/* ================= STATE / STORAGE ================= */
let storageOK=true;
try{localStorage.setItem("_t","1");localStorage.removeItem("_t");}catch(e){storageOK=false;}
let memLogs=[];
const loadLogs=()=>{ if(!storageOK) return memLogs; try{return JSON.parse(localStorage.getItem("dtp-logs")||"[]");}catch(e){return [];} };
const saveLogs=l=>{ if(storageOK) localStorage.setItem("dtp-logs",JSON.stringify(l)); else memLogs=l; };
let pxiSet=(()=>{ const d={maxHr:185,target:105,model:"auto"};
  if(!storageOK) return d;
  try{return Object.assign(d,JSON.parse(localStorage.getItem("dtp-pxi")||"{}"));}catch(e){return d;} })();
const savePxiSet=()=>{ if(storageOK) localStorage.setItem("dtp-pxi",JSON.stringify(pxiSet)); };
let view="session", curRPE=0, finishedBlocks=new Set();
let pendingManual=null;

/* ================= LIVE HR (WHOOP broadcast via Web Bluetooth) ================= */
let hrDevice=null, live={zoneSecs:[0,0,0,0,0,0], pxi:0, lastBpm:null, secs:0, tick:null};
function hrListener(e){
  const dv=e.target.value; const flags=dv.getUint8(0);
  live.lastBpm=(flags&0x1)?dv.getUint16(1,true):dv.getUint8(1);
}
async function connectWhoop(){
  if(!navigator.bluetooth){ toast("No Web Bluetooth here — open this file in Bluefy"); return; }
  try{
    hrDevice=await navigator.bluetooth.requestDevice({filters:[{services:["heart_rate"]}]});
    hrDevice.addEventListener("gattserverdisconnected",onHrDisconnect);
    await subscribeHr();
    startClock(); keepAwake();
    toast("WHOOP linked — tracking zones");
  }catch(err){ if(String(err).indexOf("cancel")<0) toast("Connection failed — check WHOOP broadcast is on"); }
}
async function subscribeHr(){
  const server=await hrDevice.gatt.connect();
  const svc=await server.getPrimaryService("heart_rate");
  const ch=await svc.getCharacteristic("heart_rate_measurement");
  await ch.startNotifications();
  ch.addEventListener("characteristicvaluechanged",hrListener);
  if(!live.tick) live.tick=setInterval(liveSecond,1000);
  const b=document.getElementById("btnConnect");
  b.textContent="WHOOP ✓"; b.classList.add("linked");
}
function onHrDisconnect(){
  clearInterval(live.tick); live.tick=null; live.lastBpm=null;
  const b=document.getElementById("btnConnect");
  b.textContent="Reconnect"; b.classList.remove("linked");
  setBand(0,"Disconnected — data so far is kept",null,null);
  toast("WHOOP disconnected");
  setTimeout(async()=>{ try{ if(hrDevice&&!hrDevice.gatt.connected){ await subscribeHr(); toast("Reconnected"); } }catch(e){} },3000);
}
function liveSecond(){
  if(live.lastBpm==null) return;
  const pct=Math.round(live.lastBpm/pxiSet.maxHr*100);
  const z=zoneOf(pct);
  live.zoneSecs[z]+=1; live.secs+=1;
  if(curDay()==="tue"||curDay()==="thu"){
    /* Tue/Thu: mirror saveSession()'s exact pipeline — round each zone to 0.1min first, then sum, then floor */
    const m4=Math.round(live.zoneSecs[4]/6)/10, m5=Math.round(live.zoneSecs[5]/6)/10;
    live.pxi=-Math.floor(m4+m5);
  } else {
    live.pxi+=(PTS[curModel()]||PTS.cardio)[z]/60;
  }
  setBand(z,ZONE_NAMES[z],live.lastBpm,pct);
  if(view==="pxi") renderLiveScore();
  updateCompliance();
}
function setBand(z,label,bpm,pct){
  const band=document.getElementById("hrband");
  band.className=z>0?"z"+z:"";
  document.getElementById("zoneName").textContent=label;
  document.getElementById("bpmV").textContent=bpm!=null?bpm:"--";
  document.getElementById("pctV").textContent=pct!=null?pct:"--";
  document.getElementById("pxiV").textContent=Math.round(live.pxi);
  document.querySelectorAll("#zoneTicks span").forEach((s,i)=>s.classList.toggle("on",bpm!=null&&(i+1)<=z));
}

/* Zone-minute compliance (Tue/Thu Z2 + Sat class) — sheet: 25–35 min Z2, ≤5 min Z3, 0 min Z4/Z5 */
function complianceRows(dayType){
  const m=live.zoneSecs.map(s=>s/60);
  const hi=m[4]+m[5];
  if(dayType==="zone2") return [
    {l:"Z2", r:"goal 25–35 min", v:m[2], cls:m[2]>=25&&m[2]<=35?"ok":(m[2]<25?"warn":"bad")},
    {l:"Z3", r:"cap 5 min", v:m[3], cls:m[3]<=5?"ok":"bad"},
    {l:"Z4–Z5", r:"zero — this must make Wednesday better, not worse", v:hi, cls:hi<0.5?"ok":"bad"}];
  /* class day */
  return [
    {l:"Z1–Z2", r:"where most of the class should live at 7/10", v:m[1]+m[2], cls:"ok"},
    {l:"Z3", r:"fine in doses", v:m[3], cls:m[3]<=10?"ok":"warn"},
    {l:"Z4–Z5", r:"class running hot — dial back", v:hi, cls:hi<2?"ok":(hi<5?"warn":"bad")}];
}
function updateCompliance(){
  const el=document.getElementById("zc"); if(!el)return;
  const rows=complianceRows(el.dataset.type);
  el.innerHTML=rows.map(r=>`<div class="zc-row ${r.cls}"><span class="zl">${r.l}</span><span class="zr">${r.r}</span><span class="zv">${r.v.toFixed(1)}m</span></div>`).join("");
}

/* ================= WAKE LOCK ================= */
let wakeLock=null, awakeWanted=false;
async function keepAwake(){
  awakeWanted=true;
  if(!("wakeLock" in navigator))return;
  try{ wakeLock=await navigator.wakeLock.request("screen"); }catch(e){}
}
function releaseAwake(){ awakeWanted=false; if(wakeLock){wakeLock.release().catch(()=>{}); wakeLock=null;} }
document.addEventListener("visibilitychange",()=>{ if(document.visibilityState==="visible"&&awakeWanted)keepAwake(); });

/* ================= SESSION CLOCK ================= */
let sessStart=null, sessAcc=0, sessInt=null;
function startClock(){ if(sessInt)return;
  sessStart=Date.now(); sessInt=setInterval(()=>{document.getElementById("clock").textContent=fmt(elapsedSec());},500);
  document.getElementById("clock").classList.remove("paused");}
const fmt=s=>Math.floor(s/60)+":"+String(s%60).padStart(2,"0");
function elapsedSec(){return Math.floor((sessAcc+(sessInt?Date.now()-sessStart:0))/1000);}

/* ================= BLOCK TIMER ================= */
let run=null;
function playBlock(bi){
  if(run&&run.bi===bi){stopBlock();return;}
  stopBlock();
  const w=+document.getElementById("weekSel").value, day=curDay();
  const b=getSession(w,day).blocks[bi];
  if(!b.bells)return;
  startClock(); keepAwake();
  run={bi, letter:b.letter, bells:b.bells, ivl:interval(b), setNo:1};
  run.end=Date.now()+run.ivl*1000;
  bell(); markLive(bi,true); updateDock();
  run.int=setInterval(tickBlock,200);
  highlightSet(bi,1);
}
function stopBlock(){ if(!run)return; clearInterval(run.int); markLive(run.bi,false); run=null;
  document.getElementById("dock").innerHTML=`<div class="dock-idle">Reach your equipment → press ▶ on that block. Bell = start your set. Rest until the next bell.</div>`;}
function tickBlock(){
  const left=Math.ceil((run.end-Date.now())/1000);
  if(left<=0){
    if(run.setNo>=run.bells){ finishBlock(); return;}
    run.setNo++; run.end=Date.now()+run.ivl*1000; bell(); highlightSet(run.bi,run.setNo);
  }
  updateDock(left<=0?run.ivl:left);
}
function finishBlock(){
  chime(); if(navigator.vibrate)navigator.vibrate([250,120,250]);
  finishedBlocks.add(run.bi);
  const card=document.getElementById("blk"+run.bi);
  if(card){card.classList.remove("live");card.classList.add("finished");
    const pb=card.querySelector(".playb"); if(pb){pb.classList.remove("live");pb.classList.add("done");pb.textContent="✓";}}
  clearInterval(run.int); const done=run.letter; run=null;
  document.getElementById("dock").innerHTML=`<div class="dock-idle"><b style="color:var(--green)">Block ${done} done.</b> Log your numbers, move to the next station, press ▶.</div>`;
}
function updateDock(left){
  if(!run)return;
  left=left??Math.ceil((run.end-Date.now())/1000);
  document.getElementById("dock").innerHTML=`<div class="dock-run">
    <div class="d-block">${run.letter}</div>
    <div class="d-mid"><div class="d-set">SET ${run.setNo} OF ${run.bells} · every ${fmt(run.ivl)}</div>
    <div class="d-time${left<=10?" warn":""}">${fmt(Math.max(0,left))}</div></div>
    <button class="d-stop" onclick="stopBlock()">✕</button></div>`;
}
function markLive(bi,on){const card=document.getElementById("blk"+bi); if(!card)return;
  card.classList.toggle("live",on);
  const pb=card.querySelector(".playb"); if(pb&&!pb.classList.contains("done")){pb.classList.toggle("live",on);pb.textContent=on?"■":"▶";}}
function highlightSet(bi,setNo){
  document.querySelectorAll(`#blk${bi} .set`).forEach(el=>{
    el.classList.toggle("now",+el.dataset.set===setNo);});
}
let AC=null;
function tone(f,t,dur,vol){const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);
  o.frequency.value=f;g.gain.setValueAtTime(vol,AC.currentTime+t);g.gain.exponentialRampToValueAtTime(.01,AC.currentTime+t+dur);
  o.start(AC.currentTime+t);o.stop(AC.currentTime+t+dur+.01);}
function ac(){try{AC=AC||new (window.AudioContext||window.webkitAudioContext)();}catch(e){}}
function bell(){ac(); if(!AC)return; tone(880,0,.35,.5); if(navigator.vibrate)navigator.vibrate(150);}
function chime(){ac(); if(!AC)return; tone(660,0,.2,.45); tone(880,.2,.2,.45); tone(1100,.4,.4,.5);}

/* ================= RENDER ================= */
function setView(v){view=v;
  document.getElementById("tabS").className="tab"+(v==="session"?" active":"");
  document.getElementById("tabP").className="tab"+(v==="pxi"?" active":"");
  document.getElementById("tabH").className="tab"+(v==="history"?" active":"");render();}
function lastFor(key,day){
  const logs=loadLogs().filter(l=>l.day===day);
  for(let i=logs.length-1;i>=0;i--){const e=(logs[i].entries||[]).find(x=>x.key===key);
    if(e&&e.sets.some(s=>s.w||s.r))return e.sets;}
  return null;
}
function rpeNoteSaveHtml(){
  let h=`<div class="notecard"><label>Session RPE</label><div class="rpe-row">`;
  for(let i=6;i<=10;i++)h+=`<button class="rpe" id="rpe${i}" onclick="setRPE(${i})">${i}</button>`;
  h+=`</div><label style="margin-top:10px">WHOOP strain (optional)</label><input type="number" id="strain" min="0" max="21" step="0.1" inputmode="decimal" placeholder="0.0–21.0">`;
  h+=`<label style="margin-top:10px">Notes (sleep, energy, anything off)</label><textarea id="note" rows="2"></textarea></div>`;
  h+=`<button class="savebtn" onclick="saveSession()">Finish</button>`;
  return h;
}
function render(){
  const w=+document.getElementById("weekSel").value, day=curDay();
  const m=document.getElementById("main");
  if(view==="history"){renderHistory(m);return;}
  if(view==="pxi"){renderPxiPage(m);return;}
  finishedBlocks=new Set();
  const s=getSession(w,day);
  document.getElementById("title").textContent="WK "+w+" · "+s.name.split(" — ")[0];
  let h="";
  if(!storageOK) h+=`<div class="warnbar">Preview mode: saving is in-memory only here. Hosted on GitHub Pages (or opened locally / in Bluefy), your log persists on this device.</div>`;

  /* ---- Tue / Thu: optional Zone 2 ---- */
  if(s.type==="zone2"){
    h+=`<div class="meta"><b>Rules:</b> Optional 25–35 min in Zone 2 — Peloton class, jog, ski, row, assault runner. ≤5 min Z3, zero Z4/Z5. Conversational pace. Skip freely — it must make the next lift better, not worse.</div>`;
    if(day==="thu") h+=`<div class="meta warn"><b>Thursday rule:</b> if you did Tuesday, strongly consider full rest today — one optional session per week is plenty during heavy weeks (6–8).</div>`;
    h+=`<div class="meta px"><b>Scoring:</b> Compliance medal on Finish — GOLD: Z2 25–35m, Z3 ≤3m, zero Z4/Z5. SILVER: Z2 20–40m, Z3 ≤8m, Z4/Z5 ≤2m. BRONZE: Z2 15–45m, Z3 ≤10m, Z4/Z5 ≤4m. RKD = 0, minus 1 per full minute in Z4/Z5.</div>`;
    h+=zone2ActivityHtml();
    h+=blockHtml(s,0);
    h+=`<div class="notecard"><label>Zone caps (live from WHOOP)</label><div id="zc" data-type="zone2"></div></div>`;
    h+=rpeNoteSaveHtml();
    h+=`<button class="restbtn" onclick="logRest()">Log full rest day instead</button>`;
    m.innerHTML=h; curRPE=0; updateCompliance(); return;
  }
  /* ---- Sat: BFT/Equinox class ---- */
  if(s.type==="class"){
    h+=`<div class="meta warn"><b>Effort cap ~7/10.</b> Don't chase RKD or race the class — this fills the conditioning slot, it is NOT a fourth lifting day. If the class runs hot (true HIIT), dial back or skip.</div>`;
    if(w===7) h+=`<div class="meta warn"><b>Week 7:</b> keep this genuinely easy — test week starts Monday.</div>`;
    if(w===8) h+=`<div class="meta warn"><b>Week 8 — test week:</b> skip class, or very easy Z1–Z2 only. A walk or 20 easy minutes on the bike at most.</div>`;
    h+=`<div class="meta px"><b>Scoring:</b> RKD counts on the cardio ramp for reference only — no medal, no target. Watch the zone card instead.</div>`;
    h+=`<div class="notecard"><label>Zone check (live from WHOOP)</label><div id="zc" data-type="class"></div></div>`;
    h+=rpeNoteSaveHtml();
    h+=`<button class="restbtn" onclick="logRest()">Skipped class — log rest</button>`;
    m.innerHTML=h; curRPE=0; updateCompliance(); return;
  }
  /* ---- Sun: CS4 recovery ---- */
  if(s.type==="recovery"){
    h+=`<div class="meta"><b>CS4 — active recovery.</b> Condensed CS4 at reduced pace/volume — coaching practice, not training. If Saturday ran harder than planned, keep this strictly easy. Sauna 10 min after is ideal.</div>`;
    h+=`<div class="meta eq"><b>Why it matters:</b> Sat (capped) + Sun (light CS4) = your built-in two-day taper into Monday's heavy Upper session.</div>`;
    if(w===8) h+=`<div class="meta warn"><b>Week 8:</b> walk-through pace only. Block complete — log final numbers. New 1RMs from Mon/Wed become the Block 2 baselines.</div>`;
    h+=rpeNoteSaveHtml();
    m.innerHTML=h; curRPE=0; return;
  }

  /* ---- Lifting days ---- */
  h+=`<div class="howto"><b>How it runs:</b> press ▶ when you reach the block's equipment. <b>Bell = start your set.</b> Rest for the remainder of the interval. Link WHOOP up top and RKD scores itself while you follow the bells.</div>`;
  h+=`<div class="meta"><b>HR target:</b> ${hrText(day,w)}</div>`;
  h+=`<div class="meta px"><b>Scoring:</b> ${MODEL_DESC[curModel()]} Target ${pxiSet.target} · Gold ±5%.</div>`;
  h+=`<div class="meta eq"><b>Equipment:</b> ${EQ[day]}</div>`;
  s.blocks.forEach((b,bi)=>{ h+=blockHtml(s,bi); });
  h+=rpeNoteSaveHtml();
  m.innerHTML=h; curRPE=0;
}
function blockHtml(s,bi){
  const day=curDay(), b=s.blocks[bi], ivl=interval(b);
  let h=`<div class="block" id="blk${bi}"><div class="block-h"><div class="t">${b.letter} · ${b.t}</div>
    <div class="bells">${b.bells?(b.bells===1?fmt(b.mins*60)+" straight":b.bells+" × "+fmt(ivl)):""} · ${b.mins} min</div>
    ${b.bells?`<button class="playb" onclick="playBlock(${bi})">▶</button>`:""}</div>`;
  b.ex.forEach((ex,ei)=>{
    h+=`<div class="ex"><div class="ex-name">${ex.n}</div>`;
    if(ex.rx)h+=`<div class="ex-rx">${ex.rx}</div>`;
    if(ex.sets>0){
      const last=lastFor(ex.key,day);
      h+=`<div class="sets">`;
      for(let i=0;i<ex.sets;i++){
        const pw=last&&last[i]?last[i].w:"", pr=last&&last[i]?last[i].r:"";
        h+=`<div class="set" data-set="${i+1}"><span class="n">${i+1}</span>
          <input inputmode="decimal" placeholder="${pw||'wt'}" id="w_${bi}_${ei}_${i}">
          <span class="x">×</span>
          <input inputmode="numeric" placeholder="${pr||'reps'}" id="r_${bi}_${ei}_${i}"></div>`;
      }
      h+=`</div>`;
    }
    h+=`</div>`;
  });
  return h+`</div>`;
}
function zone2ActivityHtml(){
  return `<div class="notecard"><label>Activity</label>
    <select id="z2act" style="width:100%">
      <option>Peloton class</option><option>Jog</option><option>Ski erg</option>
      <option>Row</option><option>Assault runner</option><option>Bike</option><option>Other</option>
    </select></div>`;
}
function setRPE(v){curRPE=v;for(let i=6;i<=10;i++)document.getElementById("rpe"+i).className="rpe"+(i===v?" on":"");}

function saveSession(){
  const w=+document.getElementById("weekSel").value, day=curDay();
  const s=getSession(w,day); const entries=[];
  s.blocks.forEach((b,bi)=>b.ex.forEach((ex,ei)=>{
    if(ex.sets>0){const sets=[];
      for(let i=0;i<ex.sets;i++){sets.push({w:document.getElementById(`w_${bi}_${ei}_${i}`).value,r:document.getElementById(`r_${bi}_${ei}_${i}`).value});}
      entries.push({key:ex.key,name:ex.n,rx:ex.rx||"",sets});}}));
  /* RKD: live wins; else attached manual entry */
  let pxi=null, zoneMins=null, model=curModel(), medal=null;
  if(live.secs>0){ pxi=Math.round(live.pxi); zoneMins=live.zoneSecs.map(x=>Math.round(x/6)/10); }
  else if(pendingManual){ pxi=pendingManual.pxi; zoneMins=pendingManual.mins; model=pendingManual.model; }
  /* Tue/Thu: compliance medal + Z4/Z5 penalty score entirely replaces the curve-based pxi above */
  if(s.type==="zone2"){
    if(zoneMins){
      const m45=(zoneMins[4]||0)+(zoneMins[5]||0);
      pxi=-Math.floor(m45);
      const md=zone2MedalFor(zoneMins[2]||0,zoneMins[3]||0,m45);
      medal=md?md.t:null;
    } else { pxi=null; medal=null; }
  } else if(s.type==="recovery"){
    /* Sun: completion badge only, never a score */
    pxi=null; medal="Done ✓";
  } else if(pxi!=null&&LIFT_DAYS.includes(day)){
    /* medals otherwise only exist on lifting days — Sat is capped effort, reference only */
    const md=medalFor(pxi,pxiSet.target); medal=md?md.t:null;
  }
  const strainEl=document.getElementById("strain");
  const strain=strainEl&&strainEl.value!==""?Math.min(21,Math.max(0,Math.round(+strainEl.value*10)/10)):null;
  const entry={date:new Date().toISOString(),week:w,day,name:s.name,type:s.type,entries,rpe:curRPE,
    note:document.getElementById("note").value,strain,duration:elapsedSec(),
    pxi,zoneMins,pxiModel:pxi!=null?model:null,medal,target:medal!=null?pxiSet.target:null};
  const actEl=document.getElementById("z2act"); if(actEl)entry.activity=actEl.value;
  const logs=loadLogs(); logs.push(entry); saveLogs(logs);
  live.zoneSecs=[0,0,0,0,0,0]; live.pxi=0; live.secs=0; pendingManual=null;
  setBand(0,live.tick?"Tracking reset — new session":"HR not connected",live.lastBpm,null);
  releaseAwake();
  toast("Saved"+(pxi!=null?" · RKD "+pxi+(medal?" · "+medal:""):"")+(storageOK?"":" (in-memory)"));
}
function logRest(){
  const w=+document.getElementById("weekSel").value, day=curDay();
  const logs=loadLogs();
  logs.push({date:new Date().toISOString(),week:w,day,name:"REST",type:"rest",entries:[],rpe:0,
    note:(document.getElementById("note")||{value:""}).value,duration:0,pxi:0,zoneMins:null,medal:"Rest ✓"});
  saveLogs(logs); toast("Rest day logged — good call");
}
function toast(t){const el=document.getElementById("toast");el.textContent=t;el.classList.add("show");setTimeout(()=>el.classList.remove("show"),2200);}

/* ================= RKD PAGE ================= */
function renderLiveScore(){
  const el=document.getElementById("liveBig"); if(!el)return;
  el.textContent=Math.round(live.pxi);
  const mins=live.zoneSecs.map(x=>x/60);
  const parts=[]; for(let i=1;i<=5;i++){ if(mins[i]>=0.5) parts.push("Z"+i+" "+mins[i].toFixed(0)+"m"); }
  document.getElementById("liveMins").textContent=parts.length?parts.join(" · "):"no zone time yet";
  const me=document.getElementById("liveMedal");
  if(!LIFT_DAYS.includes(curDay())){
    const zone2Day=curDay()==="tue"||curDay()==="thu";
    me.textContent=live.secs>0?(zone2Day?"Medal graded on Finish — see zone caps above":"Reference only — no medal on this day"):"";
    me.style.color="var(--muted)";
    return;
  }
  const md=medalFor(live.pxi,pxiSet.target);
  if(md&&live.pxi>0){ me.textContent=md.t+" pace · target "+pxiSet.target; me.style.color=md.c; } else me.textContent="";
}
function renderPxiPage(m){
  document.getElementById("title").textContent="RKD";
  const zc=["","var(--z1)","var(--z2)","var(--z3)","var(--z4)","var(--z5)"];
  const zl=["","Z1 50s","Z2 60s","Z3 70s","Z4 80s","Z5 90+"];
  let zin="";
  for(let i=1;i<=5;i++) zin+=`<label><span class="zDot" style="background:${zc[i]}"></span>${zl[i]}<input type="number" min="0" step="0.5" id="mz${i}" value="0"></label>`;
  m.innerHTML=`
  <div class="notecard"><div class="bigscore">
    <div class="v" id="liveBig">0</div>
    <div class="sub">points racked · <span id="liveMins">no zone time yet</span></div>
    <div class="medal" id="liveMedal"></div>
  </div></div>

  <div class="notecard">
    <label>Manual entry — minutes per zone (from WHOOP, if you didn't link live)</label>
    <div class="zGrid">${zin}</div>
    <div class="row2" style="align-items:center">
      <select id="manualModel" style="flex:1">
        <option value="auto">Model: auto (today's day)</option>
        <option value="strength">Strength</option>
        <option value="cardio">Cardio</option>
        <option value="summit">Summit</option>
      </select>
      <button class="btn2 acc" onclick="manualScore()">Score it</button>
    </div>
    <div id="manualOut" style="text-align:center;margin-top:12px"></div>
  </div>

  <div class="notecard">
    <label>Scoring settings</label>
    <div class="fieldrow"><span>Max heart rate</span><input type="number" id="setMaxHr" min="120" max="220" value="${pxiSet.maxHr}"></div>
    <div class="fieldrow"><span>Target RKD (lifting days)</span><input type="number" id="setTarget" min="10" max="500" value="${pxiSet.target}"></div>
    <div class="fieldrow"><span>Curve</span>
      <select id="setModel" style="flex:0 0 200px">
        <option value="auto"${pxiSet.model==="auto"?" selected":""}>Auto — strength Mon/Wed/Fri, cardio Sat</option>
        <option value="strength"${pxiSet.model==="strength"?" selected":""}>Strength (peaks Z2)</option>
        <option value="cardio"${pxiSet.model==="cardio"?" selected":""}>Cardio ramp</option>
        <option value="summit"${pxiSet.model==="summit"?" selected":""}>Summit (Z4 boost)</option>
      </select></div>
    <div class="meta px" style="margin:8px 0 0"><b>${curModel().toUpperCase()}:</b> ${MODEL_DESC[curModel()]} Medals (lifting days only): Gold ±5% · Silver 6–10% · Bronze 11–15%. Tue/Thu score zone caps, not RKD.</div>
  </div>`;
  document.getElementById("setMaxHr").addEventListener("change",e=>{pxiSet.maxHr=+e.target.value||185;savePxiSet();});
  document.getElementById("setTarget").addEventListener("change",e=>{pxiSet.target=+e.target.value||105;savePxiSet();renderLiveScore();});
  document.getElementById("setModel").addEventListener("change",e=>{pxiSet.model=e.target.value;savePxiSet();renderPxiPage(m);});
  renderLiveScore();
}
function manualScore(){
  const mins=[0]; for(let i=1;i<=5;i++)mins.push(+document.getElementById("mz"+i).value||0);
  let model=document.getElementById("manualModel").value; if(model==="auto")model=curModel();
  const pxi=Math.round(scoreZones(mins,model));
  const lift=LIFT_DAYS.includes(curDay());
  const md=lift?medalFor(pxi,pxiSet.target):null;
  pendingManual={pxi,mins,model};
  document.getElementById("manualOut").innerHTML=
    `<div style="font-family:var(--disp);font-weight:700;font-size:44px;color:var(--z4)">${pxi}</div>
     <div style="font-family:var(--disp);font-weight:700;letter-spacing:.1em;color:${md?md.c:"var(--muted)"}">${md?md.t+" · target "+pxiSet.target:(lift?"":"reference only")}</div>
     <div class="sub" style="color:var(--muted);font-size:12px;margin-top:6px">Attached — it saves with your next "Save session".</div>`;
}

/* ================= HISTORY / PRS ================= */
const e1rm=(w,r)=>w*(1+r/30);
const PR_KEYS={"Bench Press":"lb","Deadlift":"lb","Back Squat":"lb","OHP":"lb","BB Row":"lb","Weighted Pull-Up":"+lb","Dead Hang":"sec"};
const DAY_LABEL={upper:"Mon",tue:"Tue",lower:"Wed",thu:"Thu",mixed:"Fri",sat:"Sat",sun:"Sun"};
const escAttr=s=>String(s).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;");
function weeklyTotals(logs){
  const totals={};
  logs.forEach(l=>{
    if(l.day==="sat"||l.pxi==null)return;
    totals[l.week]=(totals[l.week]||0)+l.pxi;
  });
  return totals;
}
function renderHistory(m){
  document.getElementById("title").textContent="History & PRs";
  const logs=loadLogs();
  const prs={};
  logs.forEach(l=>(l.entries||[]).forEach(e=>{
    if(!(e.key in PR_KEYS))return;
    e.sets.forEach(s=>{const w=parseFloat(s.w),r=parseFloat(s.r);
      if(e.key==="Dead Hang"){if(w&&(!prs[e.key]||w>prs[e.key].v))prs[e.key]={v:w};return;}
      if(e.key==="Weighted Pull-Up"){if(!isNaN(w)&&(!prs[e.key]||w>prs[e.key].v))prs[e.key]={v:w};return;}
      if(w&&r){const est=e1rm(w,r);if(!prs[e.key]||est>prs[e.key].v)prs[e.key]={v:est,raw:w+"×"+r};}});
  }));
  let h=`<div class="pr-grid">`;
  Object.keys(PR_KEYS).forEach(k=>{const p=prs[k];
    h+=`<div class="pr"><div class="l">${k}${PR_KEYS[k]==="lb"?" · e1RM":""}</div><div class="v">${p?Math.round(p.v)+(PR_KEYS[k]==="sec"?"s":PR_KEYS[k]==="+lb"?" lb":""):"—"}</div>${p&&p.raw?`<div class="sub" style="font-size:12px;color:var(--muted)">${p.raw}</div>`:""}</div>`;});
  h+=`</div>`;
  const totals=weeklyTotals(logs);
  const weeks=Object.keys(totals).map(Number).sort((a,b)=>b-a);
  if(weeks.length){
    h+=`<div class="notecard"><label>Weekly RKD (Mon–Sun · Sat excluded)</label>`;
    weeks.forEach(wk=>{
      const t=totals[wk];
      h+=`<div class="fieldrow"><span>Week ${wk}</span><span style="font-family:var(--disp);font-weight:700;font-size:18px;color:${t<0?"var(--red)":"var(--text)"}">${t}</span></div>`;
    });
    h+=`</div>`;
  }
  if(!logs.length)h+=`<div class="meta">No sessions logged yet. Your first save lands here — with PRs and RKD computed automatically.</div>`;
  logs.map((l,idx)=>({l,idx})).reverse().forEach(({l,idx})=>{
    const dt=new Date(l.date);
    const medalColor=l.medal==="GOLD"?"var(--gold)":l.medal==="SILVER"?"var(--silver)":l.medal==="BRONZE"?"var(--bronze)":(l.medal==="Rest ✓"||l.medal==="Done ✓")?"var(--green)":"var(--muted)";
    const dl=DAY_LABEL[l.day]||"";
    const strainPill=l.strain!=null?`<span class="pxi-pill" style="color:var(--z2)">Strain ${l.strain.toFixed(1)}</span>`:"";
    const noteIcon=l.note?`<svg class="note-ic" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" title="${escAttr(l.note)}" style="cursor:pointer" onclick="toggleNote(${idx})"><path d="M4 4h13l3 3v13H4z"/><line x1="8" y1="9" x2="16" y2="9"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="12" y2="17"/></svg>`:"";
    h+=`<div class="hist-card"><div class="h"><span>Wk ${l.week}${dl?" · "+dl:""} · ${l.name}</span>
      <span style="display:flex;align-items:center;gap:8px">${l.pxi!=null?`<span class="pxi-pill"${l.pxi<0?' style="color:var(--red)"':''}>RKD ${l.pxi}</span>`:""}${l.medal?`<span class="medal-pill" style="color:${medalColor}">${l.medal}</span>`:""}${strainPill}${noteIcon}<span style="font-weight:400;color:var(--muted);font-size:13px">${dt.toLocaleDateString(undefined,{month:"short",day:"numeric"})}</span></span></div>
    <div class="sub">${l.duration?fmt(l.duration)+" · ":""}${l.rpe?"RPE "+l.rpe:""}${l.activity?" · "+l.activity:""}${l.zoneMins?" · "+l.zoneMins.map((z,i)=>i>0&&z>=0.5?"Z"+i+" "+Math.round(z)+"m":null).filter(Boolean).join(" "):""}</div>
    ${l.note?`<div class="note-full" id="noteFull${idx}" style="display:none">${escAttr(l.note)}</div>`:""}
    <div class="row2"><button onclick="copySummary(${idx})">Copy summary</button></div></div>`;});
  h+=`<div class="row2"><button onclick="exportLogs()">Export JSON</button><button onclick="importLogs()">Import JSON</button></div>`;
  m.innerHTML=h;
}
function priorBestValue(logs,uptoIdx,key){
  let best=null;
  for(let i=0;i<uptoIdx;i++){
    (logs[i].entries||[]).forEach(e=>{
      if(e.key!==key)return;
      e.sets.forEach(s=>{const w=parseFloat(s.w),r=parseFloat(s.r);
        if(key==="Dead Hang"){if(w&&(best==null||w>best))best=w;return;}
        if(key==="Weighted Pull-Up"){if(!isNaN(w)&&(best==null||w>best))best=w;return;}
        if(w&&r){const est=e1rm(w,r);if(best==null||est>best)best=est;}});
    });
  }
  return best;
}
function exerciseSummaryLine(logs,idx,e){
  const sets=e.sets.filter(s=>s.w||s.r);
  if(!sets.length)return `- ${e.name}: prescribed ${e.rx||"—"}\n  actual: no data`;
  let best=e.key in PR_KEYS?priorBestValue(logs,idx,e.key):null;
  const parts=sets.map(s=>{
    const w=parseFloat(s.w),r=parseFloat(s.r);
    let val=null;
    if(e.key==="Dead Hang")val=w||null;
    else if(e.key==="Weighted Pull-Up")val=!isNaN(w)?w:null;
    else if(w&&r)val=e1rm(w,r);
    let pr=false;
    if(e.key in PR_KEYS&&val!=null&&(best==null||val>best)){pr=true;best=val;}
    return `${s.w||""}×${s.r||""}`+(pr?" PR":"");
  });
  return `- ${e.name}: prescribed ${e.rx||"—"}\n  actual: ${parts.join(", ")}`;
}
function buildSummary(logs,idx){
  const l=logs[idx];
  const dt=new Date(l.date);
  const zm=l.zoneMins||[0,0,0,0,0,0];
  const zoneLine=`Z1 ${(zm[1]||0).toFixed(1)} · Z2 ${(zm[2]||0).toFixed(1)} · Z3 ${(zm[3]||0).toFixed(1)} · Z4 ${(zm[4]||0).toFixed(1)} · Z5 ${(zm[5]||0).toFixed(1)}`;
  const exLines=(l.entries&&l.entries.length)?l.entries.map(e=>exerciseSummaryLine(logs,idx,e)).join("\n"):"none logged";
  return `RKD SESSION SUMMARY
Date: ${dt.toLocaleDateString(undefined,{year:"numeric",month:"short",day:"numeric"})}
Session: ${l.name}
RKD: ${l.pxi!=null?l.pxi:"not logged"} (${l.medal||"no medal"})
Zone minutes: ${zoneLine}
Strain: ${l.strain!=null?l.strain.toFixed(1):"not logged"}
Exercises:
${exLines}
Notes: ${l.note||"none"}`;
}
function copySummary(idx){
  const logs=loadLogs(); if(!logs[idx])return;
  const text=buildSummary(logs,idx);
  navigator.clipboard.writeText(text).then(()=>toast("Summary copied")).catch(()=>toast("Copy failed"));
}
function toggleNote(idx){
  const el=document.getElementById("noteFull"+idx);
  if(el) el.style.display=el.style.display==="none"?"block":"none";
}
function exportLogs(){
  const blob=new Blob([JSON.stringify(loadLogs(),null,1)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="block-log-"+new Date().toISOString().slice(0,10)+".json";a.click();
}
function importLogs(){
  const inp=document.createElement("input");inp.type="file";inp.accept=".json";
  inp.onchange=e=>{const f=e.target.files[0];const r=new FileReader();
    r.onload=()=>{try{const d=JSON.parse(r.result);if(Array.isArray(d)){saveLogs(d);toast("Imported "+d.length+" sessions");render();}}catch(err){toast("Import failed");}};
    r.readAsText(f);};
  inp.click();
}

/* ================= INIT ================= */
const ws=document.getElementById("weekSel");
const start=new Date(2026,6,6); /* Mon Jul 6 – Sun Aug 30 */
for(let i=1;i<=8;i++){const o=document.createElement("option");o.value=i;
  const d1=new Date(start);d1.setDate(start.getDate()+(i-1)*7);
  o.textContent="Week "+i+" · "+d1.toLocaleDateString(undefined,{month:"short",day:"numeric"});ws.appendChild(o);}
const now=new Date(), diff=Math.floor((now-start)/(7*864e5));
ws.value=Math.min(8,Math.max(1,diff+1));
document.getElementById("daySel").value=["sun","upper","tue","lower","thu","mixed","sat"][now.getDay()];
render();
</script>
